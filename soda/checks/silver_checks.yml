# soda/checks/silver_checks.yml
#
# Data contract for the Silver layer. Runs after Bronze/Silver ingestion,
# before the allocator ever reads silver_grants or silver_expenses. A
# failing check here halts the pipeline — this is the circuit breaker,
# not a passive dashboard.
#
# Split by severity:
#   fail  -> corrupts the allocation if it proceeds; hard stop.
#   warn  -> worth Finance's attention, not worth halting a run for.

checks for silver_grants:

  # --- Structural: is the dimension even usable ---
  - row_count > 0:
      name: Grants dimension must not be empty

  # Row-count reconciliation against the raw source — grants has zero

  - row_count same as raw_grants_source:
      name: Silver grants row count must match raw source exactly

  - missing_count(GrantCode) = 0:
      name: Every grant must have a code
  - duplicate_count(GrantCode) = 0:
      name: GrantCode must be unique (dimension key)

  - missing_count(TotalAmount) = 0:
      name: TotalAmount must never be null
  - invalid_count(TotalAmount) = 0:
      valid min: 0.01
      name: TotalAmount must be positive

  - missing_count(StartDate) = 0
  - missing_count(EndDate) = 0

  # --- Cross-column: can't be expressed as a single-column check ---
  - failed rows:
      name: Grant EndDate must not precede StartDate
      fail query: |
        SELECT GrantCode
        FROM silver_grants
        WHERE EndDate < StartDate

  # --- Schema drift: catches an upstream rename/drop/type-change before it
  # silently breaks the allocator, rather than surfacing as a downstream

  - schema:
      name: Grants schema drift
      fail:
        when required column missing: [GrantCode, GrantName, TotalAmount,
          Priority, StartDate, EndDate, BusinessUnit, Country, Account,
          ProjectName, DepartmentName]

  # `schema:` above catches a column disappearing or changing type, but
  - failed rows:
      name: Unexpected new column in silver_grants
      fail query: |
        SELECT column_name
        FROM information_schema.columns
        WHERE table_name = 'silver_grants'
        AND column_name NOT IN ('GrantCode','GrantName','TotalAmount',
          'Priority','StartDate','EndDate','BusinessUnit','Country',
          'Account','ProjectName','DepartmentName')


checks for silver_expenses:

  - row_count > 0:
      name: Expenses fact table must not be empty

  - missing_count(TransactionId) = 0
  - duplicate_count(TransactionId) = 0:
      name: TransactionId must be unique — dedup failure would double-count spend

  - missing_count(TransactionDate) = 0
  - missing_count(Amount) = 0
  - invalid_count(Amount) = 0:
      valid min: 0.01
      name: Expense Amount must be positive (refunds/credits go through a
            separate reversal path, not the standard drawdown)

  - schema:
      name: Expenses schema drift
      fail:
        when required column missing: [TransactionId, TransactionDate,
          Amount, BusinessUnit, Country, Account, ProjectName, DepartmentName]

  - failed rows:
      name: Unexpected new column in silver_expenses
      fail query: |
        SELECT column_name
        FROM information_schema.columns
        WHERE table_name = 'silver_expenses'
        AND column_name NOT IN ('TransactionId','TransactionDate','Amount',
          'BusinessUnit','Country','Account','ProjectName','DepartmentName')